<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetario de cocina · Platos, alérgenos y menús</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
:root{
  --papel:#F5F6F2; --tinta:#20291F; --verde:#2F5233; --verde-osc:#243F28;
  --azafran:#DDA321; --linea:#D8DCD2; --carta:#FFFFFF; --suave:#66705F;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--papel);color:var(--tinta);min-height:100vh;}
.display{font-family:'Fraunces',Georgia,serif;}
header{background:var(--verde);color:#fff;padding:26px 20px 20px;}
.cabecera-int{max-width:1080px;margin:0 auto;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;justify-content:space-between;}
main{max-width:1080px;margin:0 auto;padding:18px 20px 60px;}
.chip-al{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:999px;background:#FBF3DD;border:1px solid #E8D9A8;color:#6B5310;}
.chip-al.ok{background:#E9F2E7;border-color:#C4DCC0;color:#2F5233;}
.chip-ing{display:inline-flex;align-items:center;font-size:13px;padding:3px 10px;border-radius:6px;
  background:#EDF0E8;border:1px solid var(--linea);color:var(--tinta);}
.chip-ing button{border:none;background:transparent;cursor:pointer;margin-left:6px;color:var(--suave);font-size:13px;padding:0;}
.tarjeta{background:var(--carta);border:1px solid var(--linea);border-radius:14px;overflow:hidden;
  transition:transform .15s ease, box-shadow .15s ease;cursor:pointer;}
.tarjeta:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(32,41,31,.10);}
.btn-verde{background:var(--verde);color:#fff;border:none;border-radius:10px;padding:10px 18px;
  font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;}
.btn-verde:hover{background:var(--verde-osc);}
.btn-linea{background:transparent;color:var(--verde);border:1.5px solid var(--verde);border-radius:10px;
  padding:9px 16px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;}
.btn-linea:hover{background:#EDF0E8;}
.btn-linea.peligro{border-color:#B4483C;color:#B4483C;}
.btn-blanco{background:transparent;color:#fff;border:1.5px solid #fff;border-radius:10px;
  padding:9px 16px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;}
input.campo, textarea.campo, select.campo{width:100%;border:1.5px solid var(--linea);border-radius:10px;
  padding:10px 12px;font-size:14px;background:#fff;color:var(--tinta);outline:none;font-family:inherit;}
input.campo:focus, textarea.campo:focus, select.campo:focus{border-color:var(--verde);}
.tab-sec{border:none;background:transparent;padding:10px 14px;border-radius:10px;font-weight:600;
  font-size:14px;cursor:pointer;color:var(--suave);white-space:nowrap;font-family:inherit;}
.tab-sec.activa{background:var(--verde);color:#fff;}
.tab-sub{border:1px solid var(--linea);background:#fff;padding:6px 14px;border-radius:999px;
  font-size:13px;font-weight:500;cursor:pointer;color:var(--tinta);white-space:nowrap;font-family:inherit;}
.tab-sub.activa{background:var(--tinta);color:#fff;border-color:var(--tinta);}
.fila-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;}
.fila-subs{display:flex;gap:8px;overflow-x:auto;padding:8px 0 4px;}
.fila-filtros{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 6px;}
.rejilla{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:10px;}
/* ── Lista de platos estilo carta elegante (a juego con la carta pública) ── */
.lista-platos-app{display:flex;flex-direction:column;margin-top:10px;max-width:760px;}
.tarjeta-lista{background:transparent;border:none;border-bottom:1px solid var(--linea);padding:14px 2px;
  display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:background .12s ease;}
.tarjeta-lista:hover{background:#EFF2EC;}
.tl-texto{flex:1;min-width:0;}
.tl-nombre{font-family:'Montserrat',system-ui,sans-serif;font-size:14px;font-weight:600;letter-spacing:.03em;
  text-transform:uppercase;display:inline-block;border-bottom:1.5px solid #B4272D;padding-bottom:2px;line-height:1.3;color:#2a2a2a;}
.tl-en{font-size:11.5px;color:#444;font-style:normal;margin-top:3px;}
.tl-desc{font-size:11.5px;color:#666;margin-top:4px;line-height:1.4;}
.tl-fila-baja{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-top:7px;}
.tl-alergenos{display:flex;flex-wrap:wrap;gap:4px;}
.tl-al-icono{width:27px;height:27px;border-radius:50%;background:#F5F0E6;border:1.5px solid #C89A5B;
  display:inline-flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.tl-precio{font-family:'Montserrat',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--teja,#B4552D);white-space:nowrap;}
.tl-foto-mini{width:82px;height:82px;flex-shrink:0;border-radius:8px;background:#1a1a1a;overflow:hidden;
  display:flex;align-items:center;justify-content:center;}
.tl-foto-mini img{max-width:100%;max-height:100%;object-fit:contain;}
.tl-sinfoto-mini{width:82px;height:82px;flex-shrink:0;border-radius:8px;background:#EDF0E8;
  display:flex;align-items:center;justify-content:center;font-size:28px;}
/* Plato destacado: foto grande arriba */
.tarjeta-lista.destacado{flex-direction:column;gap:0;border-bottom:1px solid var(--linea);padding-bottom:16px;}
.tl-foto-grande{width:100%;height:200px;background:#1a1a1a;border-radius:10px;overflow:hidden;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;}
.tl-foto-grande img{max-width:100%;max-height:100%;object-fit:contain;}
.tarjeta-lista.destacado .tl-texto{width:100%;}
@media (prefers-reduced-motion: reduce){.tarjeta-lista{transition:none;}}
.vacio{padding:60px 20px;text-align:center;color:var(--suave);}
.velo{position:fixed;inset:0;background:rgba(32,41,31,.55);z-index:50;display:flex;
  align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;margin:20px 0;overflow:hidden;}
.modal.ancho{max-width:640px;}
.etiqueta-sec{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#1E3A24;font-weight:600;}
.titulo-bloque{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--verde);margin-bottom:8px;}
.grupo-chips{display:flex;flex-wrap:wrap;gap:6px;}
label.campo-lbl{font-size:13px;font-weight:600;display:block;margin-bottom:5px;}
.btn-alergeno{border:1px solid var(--linea);background:#fff;color:var(--tinta);border-radius:999px;
  padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-alergeno.activo{border:1.5px solid var(--azafran);background:#FBF3DD;color:#6B5310;}
.caja-sugerencia{background:#FBF3DD;border:1px solid #E8D9A8;border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:8px;}
.caja-sugerencia button{border:1px solid #D9BE6B;background:#fff;border-radius:999px;padding:2px 10px;
  margin:2px 3px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
#aviso{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--tinta);color:#fff;
  padding:10px 20px;border-radius:999px;font-size:14px;z-index:60;display:none;}
details.selector-platos{border:1px solid var(--linea);border-radius:10px;background:#fff;}
details.selector-platos summary{cursor:pointer;padding:9px 12px;font-size:14px;font-weight:600;color:var(--verde);}
details.selector-platos .cuerpo{padding:4px 12px 12px;max-height:260px;overflow-y:auto;}
.fila-check{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14px;}
.fila-check input{width:16px;height:16px;accent-color:var(--verde);}
.apartado-menu{border:1px solid var(--linea);border-radius:12px;padding:12px;background:#FAFBF8;}
.fila-menu-guardado{padding:14px 4px;border-bottom:1px solid var(--linea);}
.fmg-info{margin-bottom:10px;}
.fmg-titulo{font-family:'Fraunces',Georgia,serif;font-size:17px;font-weight:600;line-height:1.2;}
.fmg-meta{font-size:12.5px;color:var(--suave);margin-top:3px;line-height:1.4;}
.fmg-botones{display:flex;gap:8px;flex-wrap:wrap;}
.fmg-botones button{padding:8px 14px;font-size:13px;}

/* ── Hoja imprimible ── */
#capaImpresion{display:none;}
body.previsualizando{overflow:hidden;}
body.previsualizando #capaImpresion{display:block;position:fixed;inset:0;background:#5b6157;z-index:80;overflow-y:auto;padding:20px;}
.barra-impresion{max-width:760px;margin:0 auto 14px;display:flex;gap:10px;justify-content:flex-end;}
.hoja{max-width:760px;margin:0 auto 40px;background:#fff;color:#20291F;padding:56px 60px;min-height:1000px;
  box-shadow:0 10px 40px rgba(0,0,0,.35);}
.hoja .cab{text-align:center;border-bottom:2px solid #2F5233;padding-bottom:18px;}
.hoja .resto{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#66705F;font-weight:600;}
.hoja h1{font-family:'Fraunces',Georgia,serif;font-size:38px;font-weight:700;margin:6px 0 2px;color:#20291F;}
.hoja .fecha{font-size:13px;color:#66705F;}
.hoja .precio{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;color:#2F5233;margin-top:8px;}
.hoja h2{font-family:'Fraunces',Georgia,serif;font-size:15px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:#2F5233;text-align:center;margin:30px 0 12px;}
.hoja h2::after{content:"";display:block;width:44px;height:2px;background:#DDA321;margin:8px auto 0;}
.hoja .plato-linea{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:7px 0;}
.hoja .plato-nombre{font-family:'Fraunces',Georgia,serif;font-size:18px;font-weight:600;}
.hoja .plato-desc{font-size:12.5px;color:#66705F;margin-top:1px;}
.hoja .plato-al{font-size:14px;white-space:nowrap;letter-spacing:2px;}
.hoja .leyenda{margin-top:36px;border-top:1px solid #D8DCD2;padding-top:14px;}
.hoja .leyenda-titulo{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#66705F;margin-bottom:8px;}
.hoja .leyenda-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:4px 14px;font-size:11.5px;color:#20291F;}
.hoja .pie{margin-top:20px;text-align:center;font-size:11px;color:#66705F;font-style:italic;}
/* ── Cuadro oficial de alérgenos ── */
.hoja-cuadro{max-width:1050px;}
.tabla-al{width:100%;border-collapse:collapse;margin-top:18px;}
.tabla-al th,.tabla-al td{border:1px solid #C9CEC2;padding:4px 6px;font-size:11.5px;}
.tabla-al thead th{background:#EDF0E8;}
.tabla-al th.col-al{width:32px;text-align:center;vertical-align:bottom;padding:6px 2px;}
.tabla-al th.col-al .icono-al{font-size:14px;display:block;margin-top:4px;}
.tabla-al th.col-al .vert{writing-mode:vertical-rl;transform:rotate(180deg);font-size:9.5px;font-weight:600;margin:0 auto;display:block;height:84px;}
.tabla-al td.celda{text-align:center;font-size:13px;color:#20291F;}
.tabla-al tr.fila-seccion td{background:#2F5233;color:#fff;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;}
.tabla-al tr.fila-sub td{background:#EDF0E8;font-weight:600;font-size:11px;}
.tabla-al td.nombre-plato{font-size:12px;}
.tabla-al tbody tr:nth-child(even) td.nombre-plato,.tabla-al tbody tr:nth-child(even) td.celda{background:#FAFBF8;}
/* ── Plantilla hotel bilingüe ── */
.hoja-hotel{font-family:'Inter',Arial,sans-serif;}
.hh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.hh-logo{max-height:64px;max-width:230px;object-fit:contain;}
.hh-nombre-resto{font-size:22px;font-weight:700;color:#20291F;}
.hh-marca{font-size:15px;color:#20291F;font-weight:600;margin-top:6px;}
.hh-linea-titulo{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-top:20px;flex-wrap:wrap;}
.hh-titulo{font-size:23px;font-weight:700;color:#20291F;}
.hh-fecha{font-size:13px;font-weight:600;color:#20291F;}
.hoja-hotel h2.hh-seccion{font-family:'Inter',Arial,sans-serif;font-size:16px;font-weight:700;letter-spacing:.02em;
  text-transform:none;color:#20291F;text-align:center;margin:30px auto 14px;display:table;
  border-bottom:2px solid #20291F;padding:0 20px 6px;}
.hoja-hotel h2.hh-seccion::after{display:none;}
.ph{text-align:center;padding:7px 0;}
.ph-nombre{font-size:16.5px;font-weight:700;color:#20291F;}
.ph-nombre sup{color:#B23A3A;font-size:10px;font-weight:700;margin-left:4px;}
.ph-en{font-size:12px;font-style:italic;color:#555;}
.hh-nota{text-align:center;font-size:15px;font-weight:700;margin-top:32px;color:#20291F;}
.hh-nota .en{display:block;font-weight:600;font-style:italic;font-size:13px;}
.hh-precios{text-align:center;margin-top:20px;font-size:14px;font-weight:700;color:#20291F;}
.hh-precios div{margin:3px 0;}
.leyenda-hotel{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 16px;margin-top:34px;}
.lh-item{display:flex;align-items:center;gap:3px;}
.lh-num{font-size:24px;font-weight:300;color:#444;line-height:1;}
.lh-cuerpo{display:flex;flex-direction:column;align-items:center;}
.lh-cuerpo span{font-size:17px;line-height:1;}
.lh-cuerpo small{font-size:8px;letter-spacing:.04em;text-transform:uppercase;color:#555;margin-top:2px;max-width:70px;text-align:center;}
.hh-pie{margin-top:26px;border-top:1px solid #999;border-bottom:1px solid #999;padding:7px 4px;text-align:center;font-size:11px;color:#333;line-height:1.5;}
/* ── Hoja trasera de ingredientes (doble cara) ── */
.hoja-salto{page-break-before:always;break-before:page;}
h2.hh-tras{font-family:'Inter',Arial,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;color:#20291F;margin:28px 0 16px;text-decoration:underline;text-underline-offset:5px;text-align:left;}
h2.hh-tras::after{display:none;}
.pt{margin:0 0 18px;}
.pt-nombre{font-size:15.5px;font-weight:700;color:#20291F;}
.pt-linea{font-size:12.5px;color:#333;font-style:italic;margin-top:1px;}
.pt-linea b{font-style:normal;}
/* ── Listado de platos (solo nombres) ── */
.hoja-listado{font-family:'Inter',Arial,sans-serif;}
.hoja-listado h2{font-family:'Fraunces',Georgia,serif;font-size:19px;font-weight:700;color:#2F5233;
  text-align:left;text-transform:none;letter-spacing:0;margin:22px 0 6px;border-bottom:2px solid #2F5233;padding-bottom:5px;}
.hoja-listado h2::after{display:none;}
.hoja-listado h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:#66705F;margin:12px 0 4px;}
.hoja-listado .cuenta{font-weight:400;color:#9aa392;}
.hoja-listado ul.lista-platos{margin:0 0 8px;padding:0;list-style:none;columns:2;column-gap:28px;}
.hoja-listado ul.lista-platos li{font-size:14px;padding:2px 0;break-inside:avoid;border-bottom:1px dotted #E4E8DE;}
/* ── Plantilla PIZARRA ── */
.hoja-pizarra{background:#20291F !important;color:#F5F6F2 !important;font-family:'Fraunces',Georgia,serif;
  border:none;padding:48px 52px;position:relative;}
.hoja-pizarra .cab{border-bottom:2px dashed #6b7a63;padding-bottom:16px;}
.hoja-pizarra h1{color:#fff !important;font-size:40px;}
.hoja-pizarra .resto, .hoja-pizarra .fecha{color:#c9d2c0 !important;}
.hoja-pizarra .precio{color:#DDA321 !important;}
.hoja-pizarra h2{color:#DDA321 !important;font-size:20px;border:none;}
.hoja-pizarra h2::after{background:#6b7a63 !important;}
.hoja-pizarra .plato-nombre{color:#fff !important;}
.hoja-pizarra .plato-desc{color:#b6c0ad !important;}
.hoja-pizarra .leyenda{border-top:1px dashed #6b7a63 !important;}
.hoja-pizarra .leyenda-titulo, .hoja-pizarra .leyenda-items, .hoja-pizarra .pie{color:#c9d2c0 !important;}
/* ── Plantilla COLUMNAS (cafetería con precios) ── */
.hoja-col h2{text-align:left;}
.hoja-col h2::after{margin:8px 0 0;}
.col-linea{display:flex;align-items:baseline;gap:8px;padding:5px 0;}
.col-nombre{font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:600;white-space:nowrap;}
.col-puntos{flex:1;border-bottom:1.5px dotted #C9CEC2;transform:translateY(-4px);min-width:20px;}
.col-precio{font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:600;color:#2F5233;white-space:nowrap;}
.col-al{font-size:12px;color:#66705F;margin-left:2px;}
.col-desc{font-size:12px;color:#66705F;margin-top:-2px;}
/* ── Plantilla ELEGANTE (una columna centrada) ── */
.hoja-eleg{font-family:'Fraunces',Georgia,serif;padding:60px 70px;}
.hoja-eleg .cab{border-bottom:1px solid #DDA321;}
.hoja-eleg h1{font-size:36px;letter-spacing:.02em;}
.hoja-eleg h2{font-size:15px;letter-spacing:.24em;color:#20291F;}
.hoja-eleg h2::after{background:#DDA321;}
.eleg-plato{text-align:center;padding:10px 0;}
.eleg-nombre{font-size:19px;font-weight:600;}
.eleg-desc{font-size:13px;color:#66705F;font-style:italic;margin-top:2px;}
.eleg-al{font-size:12px;color:#8a8375;margin-top:3px;letter-spacing:1px;}
@media print{
  html, body{overflow:visible !important;height:auto !important;}
  body > *{display:none !important;}
  body #capaImpresion{display:block !important;position:static !important;inset:auto !important;
    background:#fff;padding:0;overflow:visible !important;height:auto !important;}
  .barra-impresion{display:none !important;}
  .hoja{box-shadow:none;max-width:none;margin:0;padding:22px 40px;min-height:0 !important;height:auto !important;overflow:visible !important;}
  .hoja-hotel{font-size:97%;}
  .hoja-hotel .hh-seccion{margin:18px auto 10px !important;}
  .hoja-hotel .ph{padding:4px 0 !important;}
  .hoja-hotel .hh-nota{margin-top:18px !important;}
  .hoja-hotel .hh-precios{margin-top:14px !important;}
  .hoja-hotel .leyenda-hotel{margin-top:20px !important;gap:8px 14px !important;}
  .hoja-hotel .hh-pie{margin-top:16px !important;}
  .hoja-salto{page-break-before:always !important;break-before:page !important;}
  .hoja-pizarra{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;background:#20291F !important;color:#F5F6F2 !important;}
  .ph, .pt, .hh-nota, .hh-precios, .leyenda-hotel, .hh-pie{page-break-inside:avoid;break-inside:avoid;}
  .hoja > *:last-child{page-break-after:auto;}
  @page{margin:11mm;}
}
@media (prefers-reduced-motion: reduce){.tarjeta{transition:none;}}
@media (max-width:640px){.hoja{padding:30px 22px;}}
</style>
</head>
<body>

<header>
  <div class="cabecera-int">
    <div>
      <div class="display" style="font-size:30px;font-weight:700;line-height:1.1;">Recetario de cocina</div>
      <div style="font-size:13px;opacity:.85;margin-top:4px;">Platos, ingredientes, alérgenos y menús imprimibles · v36<span id="estadoNube"></span></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button id="btnMenus" class="btn-blanco">🖨 Menús imprimibles</button>
      <button id="btnCopia" class="btn-blanco">⇅ Copia</button>
      <button id="btnAyuda" class="btn-blanco">❓ Guía</button>
      <button id="btnModo" class="btn-blanco">✎ Modo edición</button>
    </div>
  </div>
</header>

<main>
  <div id="tabsSecciones" class="fila-tabs"></div>
  <div id="tabsSub" class="fila-subs" style="display:none;"></div>
  <div class="fila-filtros">
    <input id="buscador" class="campo" style="flex:1 1 220px;" placeholder="Buscar por plato, ingrediente, alérgeno o sección…">
    <select id="filtroAl" class="campo" style="flex:0 1 260px;"></select>

/* Normaliza un nombre para comparar duplicados: sin acentos, sin signos,
   sin espacios de más y sin el "(copia)" que añade el botón Duplicar. */
function normalizarNombre(s){
  return String(s ?? "").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\(copia\)/g, " ")
    .replace(/[^a-z0-9ñ ]/g, " ")
    .replace(/\s+/g, " ").trim();
}

function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* Nombre de plato para los menús impresos: cada palabra con mayúscula inicial
   ("PAELLA MIXTA" o "paella mixta" → "Paella Mixta"). Solo afecta a la impresión. */
function tituloPlato(s){
  return String(s ?? "").toLowerCase()
    .replace(/(^|[\s(\[«"'\-–—/.])([a-záéíóúüñç])/g, (m, sep, letra) => sep + letra.toUpperCase());
}

/* ── Almacenamiento universal ──
   Dentro de Claude usa window.storage; en la app Android (Capacitor)
   o en cualquier navegador usa IndexedDB, que guarda los datos
   de forma permanente en el dispositivo. */
const HAY_CLAUDE = typeof window.storage !== "undefined";
let dbPromise = null;
function abrirDB(){
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((res, rej) => {
    const req = indexedDB.open("recetario-db", 1);
    req.onupgradeneeded = () => req.result.createObjectStore("kv");
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
  return dbPromise;
}
function idb(modoTx, fn){
  return abrirDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction("kv", modoTx);
    const r = fn(tx.objectStore("kv"));
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  }));
}
async function stGet(k){
  if (HAY_CLAUDE){ try{ const r = await window.storage.get(k); return r ? r.value : null; }catch{ return null; } }
  try { const v = await idb("readonly", st => st.get(k)); return v ?? null; } catch { return null; }
}
async function stSet(k,v){
  if (HAY_CLAUDE){ await window.storage.set(k,v); return; }
  await idb("readwrite", st => st.put(v, k));
}
async function stDel(k){
  if (HAY_CLAUDE){ try{ await window.storage.delete(k); }catch(e){} return; }
  try { await idb("readwrite", st => st.delete(k)); } catch(e){}
}
async function guardarPlatosStore(){ await stSet("platos-meta", JSON.stringify(platos)); nubePlatos(); }

/* ── Sincronización con Firestore ── */
let nube = null;
let recibiendoNube = false;
const baseNube = () => "restaurantes/" + CODIGO_EQUIPO;

function pintarEstadoNube(estado){
  const el = document.getElementById("estadoNube");
  if (!el) return;
  if (estado === "nube") el.textContent = " · ☁️ sincronizado";
  else if (estado === "error") el.textContent = " · ⚠️ nube no disponible (funcionando en local)";
  else el.textContent = " · 🔒 solo en este dispositivo";
}

async function iniciarNube(){
  if (!FIREBASE_CONFIG){ pintarEstadoNube("local"); return; }
  try {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
    const f = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    let db;
    try { db = f.initializeFirestore(app, { localCache: f.persistentLocalCache() }); }
    catch(e){ db = f.getFirestore(app); }
    nube = { db, f };

    /* Platos: escucha en tiempo real */
    f.onSnapshot(f.doc(db, baseNube() + "/datos/platos"), async snap => {
      if (snap.metadata.hasPendingWrites) return;
      if (!snap.exists()){
        /* La nube está vacía y aquí hay datos: subir lo local (primera vez) */
        if (platos.length > 0){
          nubePlatos(); nubeMenus();
          for (const p of platos){
            if (p.tieneFoto){
              const foto = fotos[p.id] || await stGet("foto:" + p.id);
              if (foto) nubeFoto(p.id, foto);
            }
          }
        }
        return;
      }
      try {
        recibiendoNube = true;
        platos = JSON.parse(snap.data().json || "[]");
        await stSet("platos-meta", JSON.stringify(platos));
        render();
      } catch(e){} finally { recibiendoNube = false; }
    }, () => pintarEstadoNube("error"));

    /* Menús */
    f.onSnapshot(f.doc(db, baseNube() + "/datos/menus"), async snap => {
      if (snap.metadata.hasPendingWrites || !snap.exists()) return;
      try {
        recibiendoNube = true;
        menus = JSON.parse(snap.data().json || "[]");
        await stSet("menus-v1", JSON.stringify(menus));
      } catch(e){} finally { recibiendoNube = false; }
    });

    /* Fotos */
    f.onSnapshot(f.collection(db, baseNube() + "/fotos"), snap => {
      if (snap.metadata.hasPendingWrites) return;
      let hayCambios = false;
      snap.docChanges().forEach(ch => {
        const id = ch.doc.id;
        if (ch.type === "removed"){ delete fotos[id]; stDel("foto:" + id); hayCambios = true; }
        else { const d = ch.doc.data().data; if (d){ fotos[id] = d; stSet("foto:" + id, d); hayCambios = true; } }
      });
      if (hayCambios) renderLista();
    });

    pintarEstadoNube("nube");
  } catch(e){
    pintarEstadoNube("error");
  }
}

async function nubePlatos(){
  if (!nube || recibiendoNube) return;
  try { await nube.f.setDoc(nube.f.doc(nube.db, baseNube() + "/datos/platos"), { json: JSON.stringify(platos), t: Date.now() }); }
  catch(e){ pintarEstadoNube("error"); }
}
async function nubeMenus(){
  if (!nube || recibiendoNube) return;
  try { await nube.f.setDoc(nube.f.doc(nube.db, baseNube() + "/datos/menus"), { json: JSON.stringify(menus), t: Date.now() }); }

}
async function nubeFoto(id, data){
  if (!nube || recibiendoNube) return;
  try {
    const ref = nube.f.doc(nube.db, baseNube() + "/fotos/" + id);
    if (data) await nube.f.setDoc(ref, { data, t: Date.now() });
    else await nube.f.deleteDoc(ref);

}

/* ── Compresión de imagen ── */
function comprimirImagen(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX){ const f = MAX/Math.max(w,h); w = Math.round(w*f); h = Math.round(h*f); }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  return platos.filter(p => {
    if (seccion !== "todas" && SUB_A_PRINCIPAL[p.subseccion]?.id !== seccion) return false;
    if (subseccion !== "todas" && p.subseccion !== subseccion) return false;
    if (filtroAl && p.alergenos.includes(filtroAl)) return false;
    if (busqueda){
      const nombresAl = p.alergenos.map(a => AL_MAP[a]?.nombre || "").join(" ");
      const seccionTxt = (SUB_A_PRINCIPAL[p.subseccion]?.nombre || "") + " " + (NOMBRE_SUB[p.subseccion] || "");
      const t = (p.nombre + " " + (p.nombreEn || "") + " " + p.ingredientes.join(" ") + " " + nombresAl + " " + seccionTxt).toLowerCase();
      /* cada palabra buscada debe aparecer (permite "merluza sin gluten"→ no, pero "pescado carta" sí) */
      const palabras = busqueda.toLowerCase().split(/\s+/).filter(Boolean);
      if (!palabras.every(w => t.includes(w))) return false;
    }
    return true;
  });
}

    const foto = fotos[p.id];
    const alergenosMini = (p.alergenos && p.alergenos.length)
      ? `<div class="tl-alergenos">${p.alergenos.map(a => `<span class="tl-al-icono" title="${esc(AL_MAP[a]?.nombre||"")}">${AL_MAP[a]?.icono||""}</span>`).join("")}</div>`
      : `<div class="tl-alergenos"><span style="font-size:11px;color:var(--verde);font-weight:600;">✓ Sin alérgenos</span></div>`;
    const precio = p.precio ? `<div class="tl-precio">${esc(p.precio)}</div>` : "";
    const bloqueTexto = `<div class="tl-texto">
        <div class="tl-nombre">${esc(p.nombre)}</div>
        ${p.nombreEn ? `<div class="tl-en">${esc(p.nombreEn)}</div>` : ""}
        ${p.descripcion ? `<div class="tl-desc">${esc(p.descripcion)}</div>` : ""}
        <div class="tl-fila-baja">${alergenosMini}${precio}</div>
      </div>`;

    if (p.destacado && foto){
      return `<div class="tarjeta-lista destacado" data-id="${p.id}">
        <div class="tl-foto-grande"><img src="${foto}" alt="${esc(p.nombre)}"></div>
        ${bloqueTexto}
      </div>`;
    }
    const mini = foto
      ? `<div class="tl-foto-mini"><img src="${foto}" alt="${esc(p.nombre)}"></div>`
      : `<div class="tl-sinfoto-mini">${SUB_A_PRINCIPAL[p.subseccion]?.icono || "🍽️"}</div>`;
    return `<div class="tarjeta-lista" data-id="${p.id}">
      ${bloqueTexto}
      ${mini}
    </div>`;
  }).join("") + `</div>`;
  cont.querySelectorAll(".tarjeta-lista").forEach(t => t.onclick = () => abrirFicha(t.dataset.id));
}

function render(){ renderTabs(); renderLista(); }

/* ── Ficha de consulta ── */
function abrirFicha(id){
  const p = platos.find(x => x.id === id); if (!p) return;
  const foto = fotos[id];
  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo" id="velo">
    <div class="modal" onclick="event.stopPropagation()">
      ${foto ? `<div style="width:100%;height:220px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;"><img src="${foto}" alt="${esc(p.nombre)}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;"></div>` : ""}
      <div style="padding:20px 24px 24px;">
        <div class="etiqueta-sec">${esc(SUB_A_PRINCIPAL[p.subseccion]?.nombre || "")} · ${esc(NOMBRE_SUB[p.subseccion] || "")}</div>
        <h2 class="display" style="font-size:26px;font-weight:700;margin:4px 0 4px;">${esc(p.nombre)}</h2>
        ${p.descripcion ? `<p style="font-size:14px;color:var(--suave);margin:4px 0 0;">${esc(p.descripcion)}</p>` : ""}
        <div style="margin-top:18px;">
          <div class="titulo-bloque">Ingredientes</div>
          <div class="grupo-chips">${p.ingredientes.map(i => `<span class="chip-ing">${esc(i)}</span>`).join("")}</div>
        </div>
        <div style="margin-top:18px;">
          <div class="titulo-bloque">Alérgenos declarados</div>
          <div class="grupo-chips">${chipsAlergenos(p)}</div>
        </div>
        <div style="display:flex;gap:10px;margin-top:24px;justify-content:flex-end;">
          ${modo === "edicion" ? `
            <button class="btn-linea peligro" id="btnBorrar">Eliminar</button>
            <button class="btn-linea" id="btnDuplicar">Duplicar</button>
            <button class="btn-linea" id="btnEditar">Editar</button>` : ""}
          <button class="btn-verde" id="btnCerrar">Cerrar</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById("velo").onclick = cerrarModal;
  document.getElementById("btnCerrar").onclick = cerrarModal;
  if (modo === "edicion"){
    document.getElementById("btnBorrar").onclick = () => borrarPlato(id);
    document.getElementById("btnDuplicar").onclick = () => duplicarPlato(id);
    document.getElementById("btnEditar").onclick = () => { cerrarModal(); abrirFormulario(id); };
  }
}
function cerrarModal(){ document.getElementById("capaModal").innerHTML = ""; }

async function duplicarPlato(id){
  const p = platos.find(x => x.id === id); if (!p) return;
  const copia = {
    ...p,
    id: "p" + Date.now(),
    nombre: p.nombre + " (copia)",
    tieneFoto: false, /* la copia empieza sin foto; se le pone una nueva si se quiere */
  };
  platos.push(copia);
  try {
    await guardarPlatosStore();
    cerrarModal(); render();
    notificar("Plato duplicado — edítalo para ajustarlo");
    abrirFormulario(copia.id); /* abre directamente la copia para editarla */
  } catch { notificar("No se pudo duplicar."); }
}

async function borrarPlato(id){
  if (!confirm("¿Eliminar este plato de forma permanente?")) return;
  try {
    platos = platos.filter(p => p.id !== id);
    await guardarPlatosStore();
    await borrarFotoStore(id);
    delete fotos[id];
    cerrarModal(); render();
    notificar("Plato eliminado");
  } catch { notificar("No se pudo eliminar."); }
}

/* ── Formulario de alta / edición de plato ── */
function abrirFormulario(id){
  const p = id ? platos.find(x => x.id === id) : null;
  let ingredientes = p ? [...p.ingredientes] : [];
  let alergenos = p ? [...p.alergenos] : [];
  let foto = p ? (fotos[p.id] || null) : null;
  let fotoNueva = null;

  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo">
    <div class="modal ancho" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">
      <h2 class="display" style="font-size:22px;font-weight:700;margin:0;">${p ? "Editar plato" : "Nuevo plato"}</h2>
      <div style="display:grid;gap:14px;margin-top:16px;">
        <div>
          <label class="campo-lbl" for="fNombre">Nombre del plato *</label>
          <input class="campo" id="fNombre" value="${esc(p?.nombre || "")}" placeholder="Ej.: Merluza en salsa verde">
        </div>
        <div>
          <label class="campo-lbl" for="fNombreEn">Nombre en inglés <span style="font-weight:400;color:var(--suave);">(opcional, para el menú bilingüe)</span></label>
          <div style="display:flex;gap:8px;">
            <input class="campo" id="fNombreEn" value="${esc(p?.nombreEn || "")}" placeholder="Ej.: Hake in green sauce">
            ${GEMINI_API_KEY ? `<button class="btn-linea" id="fTraducir" style="white-space:nowrap;">🌐 Traducir</button>` : ""}
          </div>
        </div>
        <div>
          <label class="campo-lbl" for="fSub">Sección *</label>
          <select class="campo" id="fSub">
            ${SECCIONES.map(s => `<optgroup label="${esc(s.nombre)}">
              ${s.sub.map(sub => `<option value="${sub.id}"${p?.subseccion===sub.id?" selected":""}>${esc(sub.nombre)}</option>`).join("")}
            </optgroup>`).join("")}
          </select>
        </div>
        <div>
          <label class="campo-lbl" for="fDesc">Descripción (opcional)</label>
          <textarea class="campo" id="fDesc" rows="2" placeholder="Nota breve para el equipo de sala…">${esc(p?.descripcion || "")}</textarea>
        </div>
        <div>
          <label class="campo-lbl" for="fPrecio">Precio <span style="font-weight:400;color:var(--suave);">(opcional, para cartas con precio por plato)</span></label>
          <input class="campo" id="fPrecio" value="${esc(p?.precio || "")}" placeholder="Ej.: 4,50 €">
        </div>
        <div>
          <label class="fila-check" style="font-weight:600;">
            <input type="checkbox" id="fPublico" ${p?.publico ? "checked" : ""}>
            <span>📱 Mostrar este plato en la carta pública (QR de clientes)</span>
          </label>
          <label class="fila-check" style="font-weight:600;margin-top:6px;">
            <input type="checkbox" id="fDestacado" ${p?.destacado ? "checked" : ""}>
            <span>⭐ Destacar con foto grande (en la carta)</span>
          </label>
        <div>
          <label class="campo-lbl" for="fIng">Ingredientes * <span style="font-weight:400;color:var(--suave);">(sin cantidades — separa con comas y pulsa Añadir)</span></label>
          <div style="display:flex;gap:8px;">
            <input class="campo" id="fIng" placeholder="Ej.: merluza, harina, ajo, vino blanco, guisantes">
            <button class="btn-linea" id="fAddIng">Añadir</button>
          </div>
          <div class="grupo-chips" id="fListaIng" style="margin-top:8px;"></div>
        </div>
        <div>
          <label class="campo-lbl">Alérgenos declarados</label>
          <div id="fSugerencias"></div>
          <div class="grupo-chips" id="fAlergenos"></div>
        </div>
        <div>
          <label class="campo-lbl">Fotografía (opcional)</label>
          <div id="fZonaFoto"></div>
          <input type="file" id="fFile" accept="image/*" style="display:none;">
          <input type="file" id="fFileCam" accept="image/*" capture="environment" style="display:none;">
        </div>
        <div id="fError" style="color:#B4483C;font-size:13px;font-weight:600;display:none;"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
          <button class="btn-linea" id="fCancelar">Cancelar</button>
          <button class="btn-verde" id="fGuardar">${p ? "Guardar cambios" : "Añadir plato"}</button>
        </div>
      </div>
    </div>
  </div>`;

  const $ = x => document.getElementById(x);

  function pintarIngredientes(){
    $("fListaIng").innerHTML = ingredientes.map((ing, i) =>
      `<span class="chip-ing">${esc(ing)}<button data-i="${i}" aria-label="Quitar ${esc(ing)}">✕</button></span>`).join("");
    $("fListaIng").querySelectorAll("button").forEach(b => b.onclick = () => {
      ingredientes.splice(Number(b.dataset.i), 1);
      pintarIngredientes(); pintarSugerencias();
    });
  }
  function pintarAlergenos(){
    $("fAlergenos").innerHTML = ALERGENOS.map(a =>
      `<button class="btn-alergeno${alergenos.includes(a.id)?" activo":""}" data-al="${a.id}">${a.icono} ${esc(a.nombre)}</button>`).join("");
    $("fAlergenos").querySelectorAll("button").forEach(b => b.onclick = () => {
      const al = b.dataset.al;
      alergenos = alergenos.includes(al) ? alergenos.filter(x => x !== al) : [...alergenos, al];
      pintarAlergenos(); pintarSugerencias();
    });
  }
  function pintarSugerencias(){
    const sug = sugerirAlergenos(ingredientes).filter(a => !alergenos.includes(a));
    if (sug.length === 0){ $("fSugerencias").innerHTML = ""; return; }
    $("fSugerencias").innerHTML = `<div class="caja-sugerencia">💡 Según los ingredientes, revisa si contiene: ` +
      sug.map(a => `<button data-al="${a}">+ ${AL_MAP[a].icono} ${esc(AL_MAP[a].nombre)}</button>`).join("") + `</div>`;
    $("fSugerencias").querySelectorAll("button").forEach(b => b.onclick = () => {
      alergenos.push(b.dataset.al);
      pintarAlergenos(); pintarSugerencias();
    });
  }
  function pintarFoto(){
    if (foto){
      $("fZonaFoto").innerHTML = `<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <img src="${foto}" alt="Vista previa" style="width:110px;height:80px;object-fit:cover;border-radius:10px;border:1px solid var(--linea);">
        <button class="btn-linea" id="fCam" title="Hacer foto nueva">📷</button>
        <button class="btn-linea" id="fGal" title="Elegir de la galería">🖼</button>
        <button class="btn-linea peligro" id="fQuitar">Quitar</button>
      </div>`;
      $("fCam").onclick = () => $("fFileCam").click();
      $("fGal").onclick = () => $("fFile").click();
      $("fQuitar").onclick = () => { foto = null; fotoNueva = "BORRAR"; pintarFoto(); };
    } else {
      $("fZonaFoto").innerHTML = `<div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-linea" id="fCam">📷 Hacer foto</button>
        <button class="btn-linea" id="fGal">🖼 Galería</button>
      </div>`;
      $("fCam").onclick = () => $("fFileCam").click();
      $("fGal").onclick = () => $("fFile").click();
    }
  }

  function agregarIngredientes(){
    const nuevos = $("fIng").value.split(/[,;\n]/).map(s => s.trim()).filter(Boolean);
    if (nuevos.length === 0) return;
    ingredientes.push(...nuevos);
    $("fIng").value = "";
    pintarIngredientes(); pintarSugerencias();
  }

  $("fAddIng").onclick = agregarIngredientes;
  $("fIng").addEventListener("keydown", e => { if (e.key === "Enter"){ e.preventDefault(); agregarIngredientes(); } });
  const manejarFotoElegida = async e => {
    const file = e.target.files?.[0]; if (!file) return;
    e.target.value = "";
    try { const data = await comprimirImagen(file); foto = data; fotoNueva = data; pintarFoto(); }
    catch { mostrarError("No se pudo procesar la imagen. Prueba con otra foto."); }
  };
  $("fFile").onchange = manejarFotoElegida;
  $("fFileCam").onchange = manejarFotoElegida;
  if ($("fTraducir")) $("fTraducir").onclick = async () => {
    const nom = $("fNombre").value.trim();
    if (!nom){ mostrarError("Escribe primero el nombre en español."); return; }
    const b = $("fTraducir"); const txt = b.textContent;
    b.disabled = true; b.textContent = "…";
    try { const [en] = await traducirPlatos([nom]); if (en) $("fNombreEn").value = en; }
    catch(e){ mostrarError("No se pudo traducir: " + (e.message || "error")); }
    finally { b.disabled = false; b.textContent = txt; }
  };
  $("fCancelar").onclick = cerrarModal;

  function mostrarError(msg){
    const el = $("fError");
    if (!msg){ el.style.display = "none"; return; }
    el.textContent = msg; el.style.display = "block";
  }

  $("fGuardar").onclick = async () => {
    const nombre = $("fNombre").value.trim();
    if ($("fIng").value.trim()) agregarIngredientes();
    if (!nombre){ mostrarError("El plato necesita un nombre."); return; }
    if (ingredientes.length === 0){ mostrarError("Añade al menos un ingrediente."); return; }
    /* Aviso de plato repetido (compara ignorando mayúsculas, acentos y signos) */
    const idActual = p?.id || null;
    const gemelo = platos.find(x => x.id !== idActual && normalizarNombre(x.nombre) === normalizarNombre(nombre));
    if (gemelo){
      const donde = (SUB_A_PRINCIPAL[gemelo.subseccion]?.nombre || "") + " · " + (NOMBRE_SUB[gemelo.subseccion] || "");
      if (!confirm("⚠️ Ya existe un plato con ese nombre:\n\n« " + gemelo.nombre + " »\nen " + donde + "\n\n¿Quieres guardarlo igualmente?")) return;
    }
    mostrarError("");
    $("fGuardar").disabled = true; $("fGuardar").textContent = "Guardando…";
    const obj = {
      id: p?.id || "p" + Date.now(),
      nombre,
      nombreEn: $("fNombreEn").value.trim(),
      subseccion: $("fSub").value,
      descripcion: $("fDesc").value.trim(),
      precio: $("fPrecio").value.trim(),
      publico: $("fPublico").checked,
      destacado: $("fDestacado").checked,
      ingredientes, alergenos,
      tieneFoto: !!foto,
    };
    try {
      const existe = platos.some(x => x.id === obj.id);
      platos = existe ? platos.map(x => x.id === obj.id ? obj : x) : [...platos, obj];
      await guardarPlatosStore();
      if (fotoNueva && fotoNueva !== "BORRAR"){
        await guardarFotoStore(obj.id, fotoNueva);
        fotos[obj.id] = fotoNueva;
      } else if (fotoNueva === "BORRAR"){
        await borrarFotoStore(obj.id);
        delete fotos[obj.id];
      }
      cerrarModal(); render();
      notificar(existe ? "Plato actualizado" : "Plato añadido");
    } catch {
      $("fGuardar").disabled = false;
      $("fGuardar").textContent = p ? "Guardar cambios" : "Añadir plato";
      mostrarError("No se pudo guardar. Inténtalo de nuevo.");
    }
  };

  pintarIngredientes(); pintarAlergenos(); pintarSugerencias(); pintarFoto();
}

/* ══════════════════════════════════════════════════════════
   MENÚS IMPRIMIBLES
   ══════════════════════════════════════════════════════════ */

function abrirListaMenus(){
  const capa = document.getElementById("capaModal");
  /* Ordenar por fecha de creación (o del propio menú) descendente: lo más nuevo arriba */
  const ordenados = [...menus].sort((a, b) => (b.creado || 0) - (a.creado || 0));
  const filas = menus.length === 0
    ? `<div style="padding:24px 4px;color:var(--suave);font-size:14px;">Aún no hay menús guardados. Crea el primero: elige un título, un precio y los platos de cada apartado.</div>`
    : ordenados.map(m => `<div class="fila-menu-guardado">
        <div class="fmg-info">
          <div class="fmg-titulo">${esc(m.titulo)}</div>
          <div class="fmg-meta">${m.fecha ? "📅 " + esc(m.fecha) + " · " : ""}${m.apartados.reduce((n,a)=>n+a.platoIds.length,0)} platos${m.precio ? " · " + esc(m.precio) : ""}</div>
        </div>
        <div class="fmg-botones">
          <button class="btn-linea" data-ver="${m.id}">🖨 Ver</button>
          <button class="btn-linea" data-edit="${m.id}">Editar</button>
          <button class="btn-linea" data-dup="${m.id}" title="Crear uno nuevo a partir de este">⧉ Repetir</button>
          <button class="btn-linea peligro" data-del="${m.id}">✕</button>
        </div>
      </div>`).join("");

  capa.innerHTML = `<div class="velo" id="veloMenus">
    <div class="modal" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <h2 class="display" style="font-size:22px;font-weight:700;margin:0;">Menús imprimibles</h2>
        <button class="btn-verde" id="btnNuevoMenu">+ Nuevo menú</button>
      </div>
      <button class="btn-linea" id="btnCuadro" style="margin-top:12px;width:100%;">📋 Cuadro oficial de alérgenos (imprimible)</button>
      <button class="btn-linea" id="btnListado" style="margin-top:8px;width:100%;">📃 Listado de platos (solo nombres)</button>
      <button class="btn-linea" id="btnRepetidos" style="margin-top:8px;width:100%;">🔁 Buscar platos repetidos</button>
      <button class="btn-linea" id="btnCartaPublica" style="margin-top:8px;width:100%;">📱 Carta pública (QR)</button>
      ${GEMINI_API_KEY ? `<button class="btn-linea" id="btnTraducirTodo" style="margin-top:8px;width:100%;">🌐 Traducir al inglés los platos que falten</button>` : ""}
      ${menus.length > 3 ? `<input class="campo" id="buscarMenu" style="margin-top:10px;" placeholder="🔎 Buscar menú por fecha o título…">` : ""}
      <div id="listaMenus" style="margin-top:10px;">${filas}</div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <button class="btn-linea" id="btnCerrarMenus">Cerrar</button>
      </div>
    </div>
  </div>`;
  document.getElementById("veloMenus").onclick = cerrarModal;
  document.getElementById("btnCerrarMenus").onclick = cerrarModal;
  document.getElementById("btnNuevoMenu").onclick = () => abrirEditorMenu(null);
  document.getElementById("btnCuadro").onclick = abrirCuadro;
  document.getElementById("btnListado").onclick = previsualizarListado;
  document.getElementById("btnRepetidos").onclick = abrirRepetidos;
  document.getElementById("btnCartaPublica").onclick = abrirGestorCartaPublica;
  const btnTT = document.getElementById("btnTraducirTodo");
  if (btnTT) btnTT.onclick = async () => {
    const faltan = platos.filter(p => !p.nombreEn || !p.nombreEn.trim());
    if (faltan.length === 0){ notificar("Todos los platos ya tienen traducción."); return; }
    if (!confirm(`Se traducirán ${faltan.length} plato(s) al inglés con la IA. ¿Continuar?`)) return;
    btnTT.disabled = true; const txt = btnTT.textContent; btnTT.textContent = "Traduciendo…";
    try {
      /* en lotes de 20 para no saturar */
      for (let i = 0; i < faltan.length; i += 20){
        const lote = faltan.slice(i, i + 20);
        const traducciones = await traducirPlatos(lote.map(p => p.nombre));
        lote.forEach((p, j) => { if (traducciones[j]) p.nombreEn = traducciones[j]; });
      }
      await guardarPlatosStore();
      notificar("Traducción completada");
      abrirListaMenus();
    } catch(e){
      notificar("No se pudo traducir: " + (e.message || "error"));
      btnTT.disabled = false; btnTT.textContent = txt;
    }
  };
  const buscMenu = document.getElementById("buscarMenu");
  if (buscMenu) buscMenu.oninput = () => {
    const q = buscMenu.value.toLowerCase().trim();
    document.querySelectorAll("#listaMenus .fila-menu-guardado").forEach((fila, idx) => {
      const m = ordenados[idx];
      const texto = (m.titulo + " " + (m.fecha || "")).toLowerCase();
      fila.style.display = (!q || texto.includes(q)) ? "" : "none";
    });
  };
  capa.querySelectorAll("[data-ver]").forEach(b => b.onclick = () => { cerrarModal(); previsualizarMenu(b.dataset.ver); });
  capa.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => abrirEditorMenu(b.dataset.edit));
  capa.querySelectorAll("[data-dup]").forEach(b => b.onclick = async () => {
    const orig = menus.find(x => x.id === b.dataset.dup); if (!orig) return;
    const copia = {
      ...orig,
      id: "m" + Date.now(),
      creado: Date.now(),
      apartados: orig.apartados.map(a => ({ titulo: a.titulo, platoIds: [...a.platoIds] })),
      fecha: "", /* fecha en blanco para que pongas la del nuevo día */
    };
    menus.push(copia);
    try { await guardarMenusStore(); } catch(e){}
    abrirEditorMenu(copia.id); /* abre la copia para ajustar fecha y platos */
  });
  capa.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if (!confirm("¿Eliminar este menú? Los platos del recetario no se borran.")) return;
    menus = menus.filter(m => m.id !== b.dataset.del);
    try { await guardarMenusStore(); notificar("Menú eliminado"); } catch { notificar("No se pudo eliminar."); }
    abrirListaMenus();
  });
}

              <label class="campo-lbl" for="mNotaCentral">Nota central (español · inglés)</label>
              <input class="campo" id="mNotaCentral" value="${esc(m?.notaCentral ?? "Postre, pan y una bebida · Dessert, bread and one drink")}">

  const $ = x => document.getElementById(x);

  function pintarLogo(){
    if (logo){
      $("mZonaLogo").innerHTML = `<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <img src="${logo}" alt="Logo" style="max-height:50px;max-width:180px;object-fit:contain;border:1px solid var(--linea);border-radius:8px;padding:4px;background:#fff;">
        <button class="btn-linea" id="mLogoCambiar" style="padding:6px 12px;">Cambiar</button>
        <button class="btn-linea peligro" id="mLogoQuitar" style="padding:6px 12px;">Quitar</button>
      </div>`;

      $("mLogoQuitar").onclick = () => { logo = null; logoNuevo = "BORRAR"; pintarLogo(); };
    } else {
      $("mZonaLogo").innerHTML = `<button class="btn-linea" id="mLogoSubir" style="padding:8px 14px;">🖼 Subir logotipo</button>`;
      $("mLogoSubir").onclick = () => $("mFileLogo").click();
    }
  }
  $("mFileLogo").onchange = async e => {
    const file = e.target.files?.[0]; if (!file) return;
    e.target.value = "";
    try { const d = await comprimirImagen(file); logo = d; logoNuevo = d; pintarLogo(); }
    catch { notificar("No se pudo procesar el logotipo."); }
  };

  function actualizarPlantilla(){
    const esHotel = $("mPlantilla").value === "hotel";
    $("zonaHotel").style.display = esHotel ? "block" : "none";
    /* Si los textos siguen siendo los por defecto, cambiarlos al de la otra plantilla */
    if (esHotel){
      if ($("mTitulo").value === "Menú del día") $("mTitulo").value = "Menú Diario · Daily Menu";
      if ($("mPie").value === PIE_CLASICO) $("mPie").value = PIE_HOTEL;
      if (apartados.length === 3 && apartados[0].titulo === "Primeros" && apartados.every(a => a.platoIds.length === 0)){
        apartados[0].titulo = "Primer Plato · First Course"; apartados[0].filtroSub = "primeros";
        apartados[1].titulo = "Segundo Plato · Second Course"; apartados[1].filtroSub = "segundos";
        apartados[2].titulo = "Postre · Dessert"; apartados[2].filtroSub = "postres_menu";
        pintarApartados();
      }
    } else {
      if ($("mTitulo").value === "Menú Diario · Daily Menu") $("mTitulo").value = "Menú del día";
      if ($("mPie").value === PIE_HOTEL) $("mPie").value = PIE_CLASICO;
    }
  }
  $("mPlantilla").onchange = actualizarPlantilla;

  /* Deduce la sección principal por el título del apartado, para filtrar los platos que se ofrecen */
  function seccionPorTitulo(titulo){
    const t = (titulo || "").toLowerCase();
    if (t.includes("primer")) return "menu";
    if (t.includes("segundo")) return "menu";
    if (t.includes("postre")) return "menu";
    if (t.includes("entrante")) return "carta";
    if (t.includes("tapa")) return "tapas";
    return "todas";
  }
  /* Deduce la subsección concreta por el título */
  function subseccionPorTitulo(titulo){
    const t = (titulo || "").toLowerCase();
    if (t.includes("primer")) return "primeros";
    if (t.includes("segundo")) return "segundos";
    if (t.includes("postre")) return "postres_menu";
    return "todas";
  }
  apartados.forEach(a => { if (a.filtroSub === undefined) a.filtroSub = subseccionPorTitulo(a.titulo); });

  function pintarApartados(){
    $("mApartados").innerHTML = apartados.map((a, i) => {
      const seleccionados = a.platoIds.map(pid => platos.find(p => p.id === pid)).filter(Boolean);
      const filtro = a.filtroSub ?? "todas";
      /* opciones del desplegable de filtro */
      const optsFiltro = `<option value="todas"${filtro === "todas" ? " selected" : ""}>Todas las secciones</option>` +
        SECCIONES.map(s => `<optgroup label="${esc(s.nombre)}">` +
          s.sub.map(sub => `<option value="${sub.id}"${filtro === sub.id ? " selected" : ""}>${esc(sub.nombre)}</option>`).join("") +
          `</optgroup>`).join("");
      /* lista de platos filtrada */
      const grupos = SECCIONES.map(s => {
        const opciones = s.sub.map(sub => {
          if (filtro !== "todas" && filtro !== sub.id) return "";
          const dePlatos = platos.filter(p => p.subseccion === sub.id);
          if (dePlatos.length === 0) return "";
          return `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--suave);margin:8px 0 2px;">${esc(s.nombre)} · ${esc(sub.nombre)}</div>` +
            dePlatos.map(p => `<label class="fila-check">
              <input type="checkbox" data-ap="${i}" data-plato="${p.id}" ${a.platoIds.includes(p.id) ? "checked" : ""}>
              <span>${esc(p.nombre)}</span>
              <span style="margin-left:auto;font-size:12px;">${p.alergenos.map(al => AL_MAP[al]?.icono || "").join(" ")}</span>
            </label>`).join("");
        }).join("");
        return opciones;
      }).join("");
      const vacio = grupos.trim() === "";
      return `<div class="apartado-menu">
        <div style="display:flex;gap:8px;align-items:center;">
          <input class="campo" data-titulo-ap="${i}" value="${esc(a.titulo)}" placeholder="Título del apartado" style="flex:1;">
          <button class="btn-linea peligro" data-borrar-ap="${i}" style="padding:8px 12px;" title="Quitar apartado">✕</button>
        </div>
        <details class="selector-platos" style="margin-top:8px;">
          <summary>${seleccionados.length === 0 ? "Elegir platos…" : seleccionados.length + " plato(s): " + esc(seleccionados.map(p => p.nombre).join(", "))}</summary>
          <div class="cuerpo">
            <div style="margin:4px 0 8px;">
              <select class="campo" data-filtro-ap="${i}" style="font-size:13px;padding:6px 10px;">${optsFiltro}</select>
            </div>
            ${vacio ? '<div style="font-size:13px;color:var(--suave);padding:8px 0;">No hay platos en esta sección. Cambia el filtro a «Todas las secciones» para ver el resto.</div>' : grupos}
          </div>
        </details>
      </div>`;
    }).join("");

    $("mApartados").querySelectorAll("[data-titulo-ap]").forEach(inp =>
      inp.oninput = () => { apartados[Number(inp.dataset.tituloAp)].titulo = inp.value; });
    $("mApartados").querySelectorAll("[data-filtro-ap]").forEach(sel =>
      sel.onchange = () => {
        const i = Number(sel.dataset.filtroAp);
        apartados[i].filtroSub = sel.value;
        pintarApartados();
        const nuevoDet = $("mApartados").querySelectorAll("details")[i];
        if (nuevoDet) nuevoDet.open = true;
      });
    $("mApartados").querySelectorAll("[data-borrar-ap]").forEach(b =>
      b.onclick = () => { apartados.splice(Number(b.dataset.borrarAp), 1); pintarApartados(); });
    $("mApartados").querySelectorAll("input[type=checkbox]").forEach(ch =>
      ch.onchange = () => {
        const ap = apartados[Number(ch.dataset.ap)];
        if (ch.checked) ap.platoIds.push(ch.dataset.plato);
        else ap.platoIds = ap.platoIds.filter(x => x !== ch.dataset.plato);
        const det = ch.closest("details");
        const abierto = det?.open;
        pintarApartados();
        if (abierto){
          const nuevoDet = $("mApartados").querySelectorAll("details")[Number(ch.dataset.ap)];
          if (nuevoDet) nuevoDet.open = true;
        }
      });
  }

  $("mAddApartado").onclick = () => { apartados.push({ titulo: "", platoIds: [], filtroSub: "todas" }); pintarApartados(); };
  $("mCancelar").onclick = () => abrirListaMenus();

  $("mGuardar").onclick = async () => {
    const titulo = $("mTitulo").value.trim();
    const conPlatos = apartados.filter(a => a.platoIds.length > 0);
    const err = $("mError");
    if (!titulo){ err.textContent = "El menú necesita un título."; err.style.display = "block"; return; }
    if (conPlatos.length === 0){ err.textContent = "Elige al menos un plato en algún apartado."; err.style.display = "block"; return; }
    err.style.display = "none";
    const obj = {
      id: m?.id || "m" + Date.now(),
      creado: m?.creado || Date.now(),
      titulo,
      plantilla: $("mPlantilla").value,
      subtitulo: $("mSubtitulo").value.trim(),
      precio: $("mPrecio").value.trim(),
      precio2: $("mPrecio2").value.trim(),
      notaCentral: $("mNotaCentral").value.trim(),
      hojaTrasera: $("mHojaTrasera").checked,
      fecha: $("mFecha").value.trim(),
      pie: $("mPie").value.trim(),
      apartados: apartados.filter(a => a.titulo.trim() || a.platoIds.length > 0)
        .map(a => ({ titulo: a.titulo.trim() || "Platos", platoIds: a.platoIds })),
    };
    try {
      try {
        await stSet("config-marca", $("mMarca").value.trim());
        if (logoNuevo && logoNuevo !== "BORRAR") await stSet("config-logo", logoNuevo);
        else if (logoNuevo === "BORRAR") await stDel("config-logo");
        /* Subir a la nube para la carta pública */
        nubeConfigCarta(logoNuevo === "BORRAR" ? "" : (logoNuevo || await stGet("config-logo")), $("mMarca").value.trim());
      } catch(e){}
      const existe = menus.some(x => x.id === obj.id);
      menus = existe ? menus.map(x => x.id === obj.id ? obj : x) : [...menus, obj];
      await guardarMenusStore();
      cerrarModal();
      previsualizarMenu(obj.id);
      notificar("Menú guardado");
    } catch {
      err.textContent = "No se pudo guardar el menú. Inténtalo de nuevo.";
      err.style.display = "block";
    }
  };

  pintarApartados();
  pintarLogo();
  actualizarPlantilla();
}

/* ── Vista previa e impresión ── */
async function previsualizarMenu(id){
  const m = menus.find(x => x.id === id); if (!m) return;

  const capa = document.getElementById("capaImpresion");
  const barra = `
    <div class="barra-impresion">
      <button class="btn-linea" id="impVolver" style="background:#fff;">← Volver</button>

      <button class="btn-verde" id="impImprimir">🖨 Imprimir / Guardar PDF</button>
    </div>`;

  if (m.plantilla === "hotel"){
    /* ── Plantilla hotel bilingüe ── */
    const logo = (await stGet("config-logo")) || null;
    const marca = (await stGet("config-marca")) || "";
    const bloques = m.apartados.map(a => {
      const lineas = a.platoIds.map(pid => {
        const p = platos.find(x => x.id === pid);
        if (!p) return "";
        const nums = numerosAlergenos(p);
        return `<div class="ph">
          <div class="ph-nombre">${esc(tituloPlato(p.nombre))}${nums ? `<sup>${nums}</sup>` : ""}</div>
          ${p.nombreEn ? `<div class="ph-en">${esc(p.nombreEn)}</div>` : (p.descripcion ? `<div class="ph-en">${esc(p.descripcion)}</div>` : "")}
        </div>`;
      }).join("");
      if (!lineas) return "";
      return `<h2 class="hh-seccion">${esc(a.titulo)}</h2>${lineas}`;
    }).join("");

    const notaPartes = (m.notaCentral || "").split("·").map(s => s.trim()).filter(Boolean);
    const nota = notaPartes.length
      ? `<div class="hh-nota">${esc(notaPartes[0])}${notaPartes[1] ? `<span class="en">${esc(notaPartes.slice(1).join(" · "))}</span>` : ""}</div>`
      : "";
    const piePartes = (m.pie || "").split("·").map(s => s.trim()).filter(Boolean);
    const pie = piePartes.length
      ? `<div class="hh-pie">${piePartes.map(t => esc(t)).join("<br>")}</div>`
      : "";

    /* Hoja trasera: detalle de ingredientes y alérgenos por plato */
    let hojaTrasera = "";
    if (m.hojaTrasera !== false){
      const bloquesTras = m.apartados.map(a => {
        const lineas = a.platoIds.map(pid => {
          const p = platos.find(x => x.id === pid);
          if (!p) return "";
          const nums = numerosAlergenos(p);
          return `<div class="pt">
            <div class="pt-nombre">${esc(tituloPlato(p.nombre))}</div>
            <div class="pt-linea"><b>Ingredientes:</b> ${esc(p.ingredientes.join(", "))}</div>
            <div class="pt-linea"><b>Alérgenos:</b> ${nums || "—"}</div>
          </div>`;
        }).join("");
        if (!lineas) return "";
        return `<h2 class="hh-tras">${esc(a.titulo.split("·")[0].trim())}</h2>${lineas}`;
      }).join("");
      hojaTrasera = `
      <div class="hoja hoja-hotel hoja-salto">
        <div class="hh-top">
          <div>${logo ? `<img class="hh-logo" src="${logo}" alt="Logo">` : `<div class="hh-nombre-resto">${esc(m.subtitulo || "")}</div>`}</div>
          <div class="hh-marca">${esc(marca)}</div>
        </div>
        ${bloquesTras}
        ${leyendaHotel()}
      </div>`;
    }

    capa.innerHTML = barra + `
    <div class="hoja hoja-hotel">
      <div class="hh-top">
        <div>${logo ? `<img class="hh-logo" src="${logo}" alt="Logo">` : `<div class="hh-nombre-resto">${esc(m.subtitulo || "")}</div>`}</div>
        <div class="hh-marca">${esc(marca)}</div>
      </div>
      <div class="hh-linea-titulo">
        <div class="hh-titulo">${esc(m.titulo)}</div>
        <div class="hh-fecha">${esc(m.fecha || fechaHoyLarga())}</div>
      </div>
      ${bloques}
      ${nota}
      <div class="hh-precios">
        ${m.precio ? `<div>Precio en Cafetería · Price in Cafetería: ${esc(m.precio)} (IVA incluido · VAT Inc.)</div>` : ""}
        ${m.precio2 ? `<div>Precio en Restaurante · Price in Restaurant: ${esc(m.precio2)} (IVA incluido · VAT Inc.)</div>` : ""}
      </div>
      ${leyendaHotel()}
      ${pie}
    </div>` + hojaTrasera;
  } else if (m.plantilla === "columnas"){
    /* ── Plantilla columnas (cafetería con precios por plato) ── */

        p.alergenos.forEach(al => usados.add(al));
        const nums = p.alergenos.map(al => AL_MAP[al]?.icono || "").join("");
        return `<div class="col-linea">
            <span class="col-nombre">${esc(tituloPlato(p.nombre))}</span>
            ${nums ? `<span class="col-al">${nums}</span>` : ""}

      return `<h2>${esc(a.titulo)}</h2>${lineas}`;
    }).join("");

    capa.innerHTML = barra + `
    <div class="hoja hoja-col">
      <div class="cab">
        ${m.subtitulo ? `<div class="resto">${esc(m.subtitulo)}</div>` : ""}
        <h1>${esc(m.titulo)}</h1>
        ${m.fecha ? `<div class="fecha">${esc(m.fecha)}</div>` : ""}
      </div>
      ${bloques}
      ${leyenda ? `<div class="leyenda">
        <div class="leyenda-titulo">Alérgenos (Reglamento UE 1169/2011)</div>
        <div class="leyenda-items">${leyenda}</div>
      </div>` : ""}
      ${m.pie ? `<div class="pie">${esc(m.pie)}</div>` : ""}
    </div>`;
  } else {
    /* ── Plantillas clásica, pizarra y elegante (comparten estructura) ── */
    const claseHoja = m.plantilla === "pizarra" ? "hoja-pizarra" : (m.plantilla === "elegante" ? "hoja-eleg" : "");
    const claseLinea = m.plantilla === "elegante" ? "eleg-plato" : "plato-linea";
    const usados = new Set();
    const bloques = m.apartados.map(a => {
      const lineas = a.platoIds.map(pid => {
        const p = platos.find(x => x.id === pid);
        if (!p) return "";
        p.alergenos.forEach(al => usados.add(al));

function cerrarPrevisualizacion(){
  document.body.classList.remove("previsualizando");

/* Orientación del papel al imprimir (vertical para menús, horizontal para el cuadro) */
function fijarOrientacion(apaisado){
  let st = document.getElementById("estiloPagina");
  if (!st){ st = document.createElement("style"); st.id = "estiloPagina"; document.head.appendChild(st); }
  /* La regla de tamaño de página. El volteo a doble cara lo controla el diálogo de impresión;
     con márgenes simétricos ambas caras quedan alineadas al imprimir por el lado largo. */
  st.textContent = "@media print{@page{size:A4 " + (apaisado ? "landscape" : "portrait") + ";margin:11mm;}}";
}

/* Impresión: en la app Android usa el diálogo nativo (plugin);
   en un navegador normal usa window.print() */
async function imprimir(nombreArchivo){
  const wp = window.Capacitor?.Plugins?.WebviewPrint;
  if (wp){
    try { await wp.print({ name: nombreArchivo }); return; }
    catch(e){ /* si el plugin falla, probamos el método clásico */ }
  }
  window.print();
}

/* ══════════════════════════════════════════════════════════
   AÑADIR PLATOS DESDE FOTOGRAFÍA (Gemini)
   ══════════════════════════════════════════════════════════ */
async function llamarGemini(base64, prompt, mime){
  /* Prueba el modelo configurado y, si Google lo ha retirado, los de respaldo.
     Ante sobrecarga temporal (503/429/"high demand") reintenta con una pequeña espera. */
  const modelos = [...new Set([GEMINI_MODELO, ...GEMINI_RESPALDO])];
  let ultimoError = "sin conexión";
  for (const modelo of modelos){
    for (let intento = 0; intento < 3; intento++){
      try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${GEMINI_API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [
              { inlineData: { mimeType: mime || "image/jpeg", data: base64 } },
              { text: prompt }
            ]}]
          })
        });
        if (resp.ok) return await resp.json();
        const err = await resp.json().catch(() => ({}));
        ultimoError = err?.error?.message || ("HTTP " + resp.status);
        const msg = ultimoError.toLowerCase();
        const sobrecarga = resp.status === 503 || resp.status === 429 || msg.includes("overloaded") || msg.includes("high demand") || msg.includes("unavailable") || msg.includes("try again");
        if (sobrecarga && intento < 2){
          await new Promise(r => setTimeout(r, 1500 * (intento + 1))); /* espera creciente y reintenta el mismo modelo */
          continue;
        }
        if (sobrecarga) break; /* agotados los reintentos: probar el siguiente modelo */
        /* Si el modelo no existe o fue retirado, saltar al siguiente modelo; otros errores paran */
        if (resp.status === 404 || msg.includes("no longer available") || msg.includes("not found") || msg.includes("deprecated")) break;
        return Promise.reject(new Error(ultimoError));
      } catch(e){
        ultimoError = e.message || "error de red";
        if (intento < 2){ await new Promise(r => setTimeout(r, 1200)); continue; }
        break;
      }
    }
  }
  throw new Error(ultimoError);
}

/* Traduce una lista de nombres de plato al inglés con Gemini. Devuelve array paralelo. */
async function traducirPlatos(nombres){
  if (!GEMINI_API_KEY) throw new Error("sin clave de traducción");
  const prompt = `Traduce al inglés estos nombres de platos de restaurante español. Devuelve SOLO un array JSON de cadenas, en el mismo orden, sin texto adicional ni marcas de código. Traducción breve y natural de carta.
Platos: ${JSON.stringify(nombres)}`;
  const modelos = [...new Set([GEMINI_MODELO, ...GEMINI_RESPALDO])];
  let ultimoError = "sin conexión";
  for (const modelo of modelos){
    for (let intento = 0; intento < 3; intento++){
      try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${GEMINI_API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        if (resp.ok){
          const data = await resp.json();
          let texto = (data?.candidates?.[0]?.content?.parts || []).map(p => p.text || "").join("");
          texto = texto.replace(/```json|```/g, "").trim();
          const ini = texto.indexOf("["), fin = texto.lastIndexOf("]");
          if (ini === -1 || fin === -1) throw new Error("respuesta sin JSON");
          return JSON.parse(texto.slice(ini, fin + 1)).map(s => String(s).trim());
        }
        const err = await resp.json().catch(() => ({}));
        ultimoError = err?.error?.message || ("HTTP " + resp.status);
        const msg = ultimoError.toLowerCase();
        const sobrecarga = resp.status === 503 || resp.status === 429 || msg.includes("overloaded") || msg.includes("high demand") || msg.includes("unavailable") || msg.includes("try again");
        if (sobrecarga && intento < 2){ await new Promise(r => setTimeout(r, 1500 * (intento + 1))); continue; }
        if (sobrecarga) break; /* agotados los reintentos: probar el siguiente modelo */
        if (resp.status === 404 || msg.includes("no longer available") || msg.includes("not found") || msg.includes("deprecated")) break;
        return Promise.reject(new Error(ultimoError));
      } catch(e){
        ultimoError = e.message || "error de red";
        if (intento < 2){ await new Promise(r => setTimeout(r, 1200)); continue; }
        break;
      }
    }
  }
  throw new Error(ultimoError);
}

function archivoABase64(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(String(e.target.result).split(",")[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
