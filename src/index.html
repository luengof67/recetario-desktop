  return `Analiza este documento de un restaurante español (carta, menú del día, ficha de cocina, pizarra o lista manuscrita).
Extrae TODOS los platos que aparezcan. Para cada plato:
- "nombre": el nombre del plato tal como aparece.
- "nombre_en": traducción breve y natural del nombre del plato al inglés (si el documento ya la incluye, usa esa).
- "descripcion": breve, solo si el documento la incluye; si no, "".
- "seccion": clasifícalo según el apartado del documento donde aparece (por ejemplo bajo el título "Primeros" o "Segundos") o dedúcelo por el tipo de plato. Usa EXACTAMENTE uno de estos identificadores: ${listaSecciones}.
- "ingredientes": los ingredientes escritos en el documento; si no aparecen, dedúcelos de forma razonable por el nombre del plato (sin cantidades, en minúsculas).
Responde SOLO con un array JSON válido, sin texto adicional ni marcas de código:
[{"nombre":"...","nombre_en":"...","descripcion":"","seccion":"primeros","ingredientes":["...","..."]}]
Si no hay platos legibles, responde [].`;
}

function mostrarLeyendo(){
  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo">
    <div class="modal" style="padding:30px 24px;text-align:center;">
      <div style="font-size:36px;">📄</div>
      <div class="display" style="font-size:20px;font-weight:600;margin-top:8px;">Leyendo el documento…</div>
      <div style="font-size:13px;color:var(--suave);margin-top:6px;">Detectando platos, secciones e ingredientes. Suele tardar unos segundos.</div>
    </div>
  </div>`;
}

function procesarRespuestaDeteccion(resp){
  let texto = (resp?.candidates?.[0]?.content?.parts || []).map(p => p.text || "").join("");
  texto = texto.replace(/```json|```/g, "").trim();
  const inicio = texto.indexOf("["), fin = texto.lastIndexOf("]");
  if (inicio === -1 || fin === -1) throw new Error("respuesta sin JSON");
  const detectados = JSON.parse(texto.slice(inicio, fin + 1));
  if (!Array.isArray(detectados) || detectados.length === 0){
    cerrarModal();
    notificar("No se han detectado platos. Prueba con un documento más claro.");
    return;
  }
  abrirRevisionEscaneo(detectados.map(d => {
    const ings = Array.isArray(d.ingredientes) ? d.ingredientes.map(i => String(i).trim()).filter(Boolean) : [];
    return {
      incluir: true,
      nombre: String(d.nombre || "").trim(),
      nombreEn: String(d.nombre_en || "").trim(),
      descripcion: String(d.descripcion || "").trim(),
      ingredientes: ings,
      subseccion: NOMBRE_SUB[d.seccion] ? d.seccion : "primeros",
      alergenos: sugerirAlergenos(ings),
      foto: null,
    };
  }).filter(d => d.nombre));
}

function manejarErrorDeteccion(e){
  cerrarModal();
  const msg = (e.message || "").toLowerCase();
  if (msg.includes("high demand") || msg.includes("overloaded") || msg.includes("unavailable"))
    notificar("El servicio está saturado ahora mismo. Espera un momento y vuelve a intentarlo.");
  else
    notificar("No se pudo leer el documento. Detalle: " + (e.message || "error de conexión"));
}

/* Detectar platos a partir de TEXTO (Word, txt o texto pegado de una web) */
async function procesarTexto(textoDoc){
  if (!textoDoc || textoDoc.trim().length < 3){ notificar("No hay texto que analizar."); return; }
  mostrarLeyendo();
  try {
    const resp = await llamarGeminiTexto(promptDeteccion() + "\n\nDOCUMENTO:\n" + textoDoc.slice(0, 20000));
    procesarRespuestaDeteccion(resp);
  } catch(e){ manejarErrorDeteccion(e); }
}

/* Igual que llamarGemini pero solo texto (sin imagen) */
async function llamarGeminiTexto(prompt){
  const modelos = [...new Set([GEMINI_MODELO, ...GEMINI_RESPALDO])];
  let ultimoError = "sin conexión";
  for (const modelo of modelos){
    for (let intento = 0; intento < 3; intento++){
      try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${GEMINI_API_KEY}`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        if (resp.ok) return await resp.json();
        const err = await resp.json().catch(() => ({}));
        ultimoError = err?.error?.message || ("HTTP " + resp.status);
        const msg = ultimoError.toLowerCase();
        const sobrecarga = resp.status === 503 || resp.status === 429 || msg.includes("overloaded") || msg.includes("high demand") || msg.includes("unavailable") || msg.includes("try again");
        if (sobrecarga && intento < 2){ await new Promise(r => setTimeout(r, 1500 * (intento + 1))); continue; }
        if (sobrecarga) break; /* agotados los reintentos: probar el siguiente modelo */
        if (resp.status === 404 || msg.includes("no longer available") || msg.includes("not found") || msg.includes("deprecated")) break;
        return Promise.reject(new Error(ultimoError));
      } catch(e){ ultimoError = e.message || "error de red"; if (intento < 2){ await new Promise(r => setTimeout(r, 1200)); continue; } break; }
    }
  }
  throw new Error(ultimoError);
}

async function escanearImagen(file){
  const nombre = (file.name || "").toLowerCase();
  /* Word: extraer texto con mammoth y procesar como texto */
  if (nombre.endsWith(".docx") || nombre.endsWith(".doc")){
    mostrarLeyendo();
    try {
      const buffer = await file.arrayBuffer();
      const res = await window.mammoth.extractRawText({ arrayBuffer: buffer });
      cerrarModal();
      await procesarTexto(res.value || "");
    } catch(e){ cerrarModal(); notificar("No se pudo leer el Word: " + (e.message || "error")); }
    return;
  }
  /* Texto plano */
  if (nombre.endsWith(".txt")){
    try { const t = await file.text(); await procesarTexto(t); }
    catch(e){ notificar("No se pudo leer el archivo de texto."); }
    return;
  }
  /* Imagen o PDF: enviar a Gemini con visión */
  mostrarLeyendo();
  try {
    const esPdf = file.type === "application/pdf" || nombre.endsWith(".pdf");
    let base64, mime;
    if (esPdf){ base64 = await archivoABase64(file); mime = "application/pdf"; }
    else { const dataUrl = await comprimirImagen(file); base64 = dataUrl.split(",")[1]; mime = "image/jpeg"; }
    const resp = await llamarGemini(base64, promptDeteccion(), mime);
    procesarRespuestaDeteccion(resp);
  } catch(e){ manejarErrorDeteccion(e); }
}

function abrirRevisionEscaneo(items){
  const capa = document.getElementById("capaModal");
  const opcionesSeccion = SECCIONES.map(s => `<optgroup label="${esc(s.nombre)}">
    ${s.sub.map(sub => `<option value="${sub.id}">${esc(sub.nombre)}</option>`).join("")}
  </optgroup>`).join("");
  let fotoIndice = null; /* a qué plato va la próxima foto */

  capa.innerHTML = `<div class="velo">
    <div class="modal ancho" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">
      <h2 class="display" style="font-size:22px;font-weight:700;margin:0;">Revisar platos detectados (${items.length})</h2>
      <p style="font-size:13px;color:var(--suave);margin:8px 0 4px;">
        Corrige lo que haga falta: nombre, sección, ingredientes, <strong>alérgenos</strong> (vienen premarcados según los ingredientes — confírmalos tú) y foto del plato si procede. Desmarca los que no quieras añadir.</p>
      <div id="revLista" style="display:grid;gap:12px;margin-top:12px;"></div>
      <div id="revError" style="color:#B4483C;font-size:13px;font-weight:600;display:none;margin-top:10px;"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button class="btn-linea" id="revCancelar">Cancelar</button>
        <button class="btn-verde" id="revAnadir">Añadir seleccionados</button>
      </div>
      <input type="file" id="revFotoGal" accept="image/*" style="display:none;">
      <input type="file" id="revFotoCam" accept="image/*" capture="environment" style="display:none;">
    </div>
  </div>`;

  function pintar(){
    document.getElementById("revLista").innerHTML = items.map((it, i) => `
      <div class="apartado-menu" style="opacity:${it.incluir ? 1 : .45};">
        <label class="fila-check" style="font-weight:600;">
          <input type="checkbox" data-inc="${i}" ${it.incluir ? "checked" : ""}> <span>Añadir este plato</span>
        </label>
        <div style="display:grid;gap:8px;margin-top:6px;">
          <input class="campo" data-nom="${i}" value="${esc(it.nombre)}" placeholder="Nombre del plato">
          <select class="campo" data-sec="${i}">${opcionesSeccion}</select>
          <textarea class="campo" data-ing="${i}" rows="2" placeholder="Ingredientes separados por comas">${esc(it.ingredientes.join(", "))}</textarea>
          <div>
            <div style="font-size:12px;font-weight:600;margin-bottom:4px;">Alérgenos:</div>
            <div class="grupo-chips">
              ${ALERGENOS.map(a => `<button class="btn-alergeno${it.alergenos.includes(a.id) ? " activo" : ""}" data-al="${i}:${a.id}" style="padding:3px 9px;font-size:12px;">${a.icono} ${esc(a.nombre)}</button>`).join("")}
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            ${it.foto ? `<img src="${it.foto}" alt="" style="width:72px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--linea);">` : ""}
            <button class="btn-linea" data-cam="${i}" style="padding:6px 12px;font-size:13px;">📷 Foto</button>
            <button class="btn-linea" data-gal="${i}" style="padding:6px 12px;font-size:13px;">🖼 Galería</button>
            ${it.foto ? `<button class="btn-linea peligro" data-sinfoto="${i}" style="padding:6px 12px;font-size:13px;">✕</button>` : ""}
          </div>
        </div>
      </div>`).join("");

    items.forEach((it, i) => {
      const sel = document.querySelector(`[data-sec="${i}"]`);
      if (sel) sel.value = it.subseccion;
    });
    document.querySelectorAll("[data-inc]").forEach(ch => ch.onchange = () => {
      items[Number(ch.dataset.inc)].incluir = ch.checked; pintar();
    });
    document.querySelectorAll("[data-nom]").forEach(inp => inp.oninput = () => {
      items[Number(inp.dataset.nom)].nombre = inp.value;
    });
    document.querySelectorAll("[data-sec]").forEach(sel => sel.onchange = () => {
      items[Number(sel.dataset.sec)].subseccion = sel.value;
    });
    document.querySelectorAll("[data-ing]").forEach(ta => ta.onchange = () => {
      const i = Number(ta.dataset.ing);
      items[i].ingredientes = ta.value.split(/[,;\n]/).map(s => s.trim()).filter(Boolean);
      /* añade a lo marcado las sugerencias nuevas de los ingredientes editados */
      sugerirAlergenos(items[i].ingredientes).forEach(a => {
        if (!items[i].alergenos.includes(a)) items[i].alergenos.push(a);
      });
      pintar();
    });
    document.querySelectorAll("[data-al]").forEach(b => b.onclick = () => {
      const [i, al] = b.dataset.al.split(":");
      const it = items[Number(i)];
      it.alergenos = it.alergenos.includes(al) ? it.alergenos.filter(x => x !== al) : [...it.alergenos, al];
      pintar();
    });
    document.querySelectorAll("[data-cam]").forEach(b => b.onclick = () => {
      fotoIndice = Number(b.dataset.cam); document.getElementById("revFotoCam").click();
    });
    document.querySelectorAll("[data-gal]").forEach(b => b.onclick = () => {
      fotoIndice = Number(b.dataset.gal); document.getElementById("revFotoGal").click();
    });
    document.querySelectorAll("[data-sinfoto]").forEach(b => b.onclick = () => {
      items[Number(b.dataset.sinfoto)].foto = null; pintar();
    });
  }

  const manejarFotoRev = async e => {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file || fotoIndice === null) return;
    try {
      items[fotoIndice].foto = await comprimirImagen(file);
      pintar();
    } catch { notificar("No se pudo procesar la imagen."); }
  };
  document.getElementById("revFotoGal").onchange = manejarFotoRev;
  document.getElementById("revFotoCam").onchange = manejarFotoRev;

  document.getElementById("revCancelar").onclick = cerrarModal;
  document.getElementById("revAnadir").onclick = async () => {
    const elegidos = items.filter(it => it.incluir && it.nombre.trim() && it.ingredientes.length > 0);
    const err = document.getElementById("revError");
    if (elegidos.length === 0){
      err.textContent = "Marca al menos un plato con nombre e ingredientes.";
      err.style.display = "block";
      return;
    }
    err.style.display = "none";
    const base = Date.now();
    const nuevos = [];
    elegidos.forEach((it, i) => {
      const p = {
        id: "p" + (base + i),
        nombre: it.nombre.trim(),
        nombreEn: it.nombreEn || "",
        subseccion: it.subseccion,
        descripcion: it.descripcion,
        ingredientes: it.ingredientes,
        alergenos: it.alergenos,
        tieneFoto: !!it.foto,
      };
      platos.push(p);
      if (it.foto) nuevos.push({ id: p.id, foto: it.foto });
    });
    try {
      await guardarPlatosStore();
      for (const n of nuevos){
        fotos[n.id] = n.foto;
        await guardarFotoStore(n.id, n.foto);
      }
      cerrarModal(); render();
      notificar(elegidos.length + " plato(s) añadidos al recetario");
    } catch {
      err.textContent = "No se pudo guardar. Inténtalo de nuevo.";
      err.style.display = "block";
    }
  };

  pintar();
}

/* ══════════════════════════════════════════════════════════
   COPIA DE SEGURIDAD (exportar / importar)
   ══════════════════════════════════════════════════════════ */
function abrirCopia(){
  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo" id="veloCopia">
    <div class="modal" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">
      <h2 class="display" style="font-size:22px;font-weight:700;margin:0;">Copia de seguridad</h2>
      <p style="font-size:14px;color:var(--suave);margin:10px 0 16px;">
        Exporta todo el recetario (platos, fotos y menús) a un archivo, o restaura una copia hecha en otro dispositivo.
        Al importar se sustituyen los datos actuales.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-verde" id="btnExportar">⤓ Exportar recetario</button>
        <button class="btn-linea" id="btnImportar">⤒ Importar copia</button>
        <input type="file" id="fileImportar" accept=".json,application/json" style="display:none;">
      </div>
      <div id="copiaEstado" style="font-size:13px;margin-top:12px;color:var(--suave);"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <button class="btn-linea" id="btnCerrarCopia">Cerrar</button>
      </div>
    </div>
  </div>`;
  document.getElementById("veloCopia").onclick = cerrarModal;
  document.getElementById("btnCerrarCopia").onclick = cerrarModal;

  document.getElementById("btnExportar").onclick = async () => {
    const estado = document.getElementById("copiaEstado");
    estado.textContent = "Preparando copia…";
    try {
      const fotosExp = {};
      for (const p of platos){
        if (p.tieneFoto){
          const f = fotos[p.id] || await stGet("foto:" + p.id);
          if (f) fotosExp[p.id] = f;
        }
      }
      const datos = JSON.stringify({ version: 1, fecha: new Date().toISOString(), platos, menus, fotos: fotosExp });
      const blob = new Blob([datos], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "recetario-" + new Date().toISOString().slice(0,10) + ".json";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      estado.textContent = "Copia exportada. Guárdala en un lugar seguro (Drive, correo, etc.).";
    } catch {
      estado.textContent = "No se pudo exportar la copia.";
    }
  };

  document.getElementById("btnImportar").onclick = () => document.getElementById("fileImportar").click();
  document.getElementById("fileImportar").onchange = async e => {
    const file = e.target.files?.[0]; if (!file) return;
    const estado = document.getElementById("copiaEstado");
    if (!confirm("Esto sustituirá el recetario actual por el de la copia. ¿Continuar?")) return;
    estado.textContent = "Importando…";
    try {
      const texto = await file.text();
      const datos = JSON.parse(texto);
      if (!Array.isArray(datos.platos)) throw new Error("formato");
      platos = datos.platos;
      menus = Array.isArray(datos.menus) ? datos.menus : [];
      fotos = {};
      await guardarPlatosStore();
      await guardarMenusStore();
      for (const [id, f] of Object.entries(datos.fotos || {})){
        await guardarFotoStore(id, f);
        fotos[id] = f;
      }
      render();
      estado.textContent = "Copia restaurada: " + platos.length + " platos y " + menus.length + " menús.";
      notificar("Recetario restaurado");
    } catch {
      estado.textContent = "El archivo no es una copia válida del recetario.";
    }
  };
}

  document.getElementById("btnNuevo").style.display = modo === "edicion" ? "inline-block" : "none";
  document.getElementById("btnEscanear").style.display = (modo === "edicion" && GEMINI_API_KEY) ? "inline-block" : "none";
  render();
};
document.getElementById("btnNuevo").onclick = () => {

  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo" id="veloNuevo">
    <div class="modal" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">
      <h2 class="display" style="font-size:20px;font-weight:700;margin:0 0 6px;">Añadir plato</h2>

      <div style="display:grid;gap:10px;">
        <button class="btn-verde" id="nuevoMano" style="padding:14px;">✍️ Crear a mano</button>

        <button class="btn-linea" id="nuevoTexto" style="padding:13px;">📋 Pegar texto (de una web, correo…)</button>
        <button class="btn-linea" id="nuevoCancelar" style="border-color:var(--linea);color:var(--suave);">Cancelar</button>
      </div>
      <p style="font-size:12px;color:var(--suave);margin:12px 0 0;">Con foto, archivo o texto se detectan todos los platos que aparezcan (un menú entero de una vez) y los revisas antes de guardar.</p>

  </div>`;
  document.getElementById("veloNuevo").onclick = cerrarModal;
  document.getElementById("nuevoCancelar").onclick = cerrarModal;

  document.getElementById("nuevoDoc").onclick = () => document.getElementById("fileEscanear").click();
  document.getElementById("nuevoTexto").onclick = abrirPegarTexto;
};

  capa.innerHTML = `<div class="velo" id="veloTexto">
    <div class="modal" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">
      <h2 class="display" style="font-size:20px;font-weight:700;margin:0 0 6px;">Pegar texto</h2>
      <p style="font-size:13px;color:var(--suave);margin:0 0 12px;">Copia el texto de una página web, un correo o un documento y pégalo aquí. La IA detectará los platos.</p>
      <textarea class="campo" id="textoPegado" rows="9" placeholder="Pega aquí el texto con los platos…"></textarea>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;">
        <button class="btn-linea" id="txtCancelar">Cancelar</button>

    </div>

document.getElementById("btnEscanear").onclick = () => {
  const capa = document.getElementById("capaModal");
  capa.innerHTML = `<div class="velo" id="veloEsc">
    <div class="modal" onclick="event.stopPropagation()" style="padding:22px 24px 24px;">

      <p style="font-size:13px;color:var(--suave);margin:0 0 14px;">Fotografía una carta, ficha o pizarra, o elige una imagen que ya tengas.</p>
      <div style="display:grid;gap:10px;">
        <button class="btn-verde" id="escCamara" style="padding:14px;">📷 Hacer foto con la cámara</button>

["fileEscanear", "fileEscanearCam"].forEach(id => {
  document.getElementById(id).onchange = e => {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (file) escanearImagen(file);
  };
});
document.getElementById("btnMenus").onclick = abrirListaMenus;
document.getElementById("buscador").addEventListener("input", e => { busqueda = e.target.value; renderLista(); });

const selAl = document.getElementById("filtroAl");
selAl.innerHTML = `<option value="">Filtro alérgenos: mostrar todo</option>` +
  ALERGENOS.map(a => `<option value="${a.id}">Sin ${esc(a.nombre.toLowerCase())}</option>`).join("");
selAl.onchange = e => { filtroAl = e.target.value; renderLista(); };

/* ── Arranque ── */
(async () => {
  document.getElementById("lista").innerHTML = `<div class="vacio">Cargando recetario…</div>`;
  const [pRaw, mRaw] = [await stGet("platos-meta"), await stGet("menus-v1")];
  try { platos = pRaw ? JSON.parse(pRaw) : []; } catch { platos = []; }
  try { menus = mRaw ? JSON.parse(mRaw) : []; } catch { menus = []; }
  render();
  iniciarNube();
  for (const p of platos){
    if (p.tieneFoto){
      const f = await stGet("foto:" + p.id);
      if (f){ fotos[p.id] = f; renderLista(); }
    }
  }
})();
</script>
